Monthly refresh · YML
name: Monthly CMS Data Refresh
 
on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
 
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
 
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install pandas requests openpyxl
 
      - name: Download latest Care Compare data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
 
          print("Fetching latest Care Compare download URL...")
          meta_url = "https://data.cms.gov/provider-data/api/1/metastore/schemas/dataset/items/4pq5-n9py"
          with urllib.request.urlopen(meta_url, timeout=30) as r:
              meta = json.load(r)
 
          dist = meta.get("distribution", [])
          csv_url = None
          for item in dist:
              url = item.get("downloadURL", "")
              if url.endswith(".csv"):
                  csv_url = url
                  break
 
          if not csv_url:
              raise Exception("Could not find Care Compare CSV URL")
 
          print(f"Downloading from: {csv_url}")
          urllib.request.urlretrieve(csv_url, "NH_ProviderInfo_latest.csv")
          size = os.path.getsize("NH_ProviderInfo_latest.csv")
          print(f"Downloaded {size:,} bytes")
          PYEOF
 
      - name: Download latest Health Citations data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
 
          print("Fetching Health Citations URL...")
          meta_url = "https://data.cms.gov/provider-data/api/1/metastore/schemas/dataset/items/r5ix-sfxw"
          with urllib.request.urlopen(meta_url, timeout=30) as r:
              meta = json.load(r)
 
          dist = meta.get("distribution", [])
          csv_url = None
          for item in dist:
              url = item.get("downloadURL", "")
              if url.endswith(".csv"):
                  csv_url = url
                  break
 
          if not csv_url:
              raise Exception("Could not find Health Citations CSV URL")
 
          print(f"Downloading from: {csv_url}")
          urllib.request.urlretrieve(csv_url, "NH_HealthCitations_latest.csv")
          size = os.path.getsize("NH_HealthCitations_latest.csv")
          print(f"Downloaded {size:,} bytes")
          PYEOF
 
      - name: Rebuild Powerlink database
        run: |
          python3 << 'PYEOF'
          import pandas as pd
          import json
 
          print("Loading Care Compare data...")
          df = pd.read_csv("NH_ProviderInfo_latest.csv", dtype=str, low_memory=False)
          df.columns = df.columns.str.strip()
 
          print("Loading citations data...")
          cit = pd.read_csv("NH_HealthCitations_latest.csv", dtype=str, low_memory=False)
          cit.columns = cit.columns.str.strip()
 
          # Filter to veteran homes only
          vet_mask = df['Facility Name'].str.contains(
              r"veteran|veter|state home|soldiers|sailor|war veteran",
              case=False, na=False
          )
          df_vet = df[vet_mask].copy()
          print(f"Veteran facilities found: {len(df_vet)}")
 
          # Count EVS citations (F880 = infection control)
          evs_tags = ['F880','F881','F882','F883','F884','F885']
          evs_cit = cit[cit['Tag Number'].isin(evs_tags)].copy()
          evs_counts = evs_cit.groupby('Federal Provider Number').size().reset_index(name='EVS_Citation_Count')
 
          # Count dietary citations
          diet_tags = [f'F{n}' for n in range(800, 813)]
          diet_cit = cit[cit['Tag Number'].isin(diet_tags)].copy()
          diet_counts = diet_cit.groupby('Federal Provider Number').size().reset_index(name='Dietary_Citation_Count')
 
          # Merge
          df_vet = df_vet.merge(evs_counts, on='Federal Provider Number', how='left')
          df_vet = df_vet.merge(diet_counts, on='Federal Provider Number', how='left')
          df_vet['EVS_Citation_Count'] = pd.to_numeric(df_vet['EVS_Citation_Count'], errors='coerce').fillna(0).astype(int)
          df_vet['Dietary_Citation_Count'] = pd.to_numeric(df_vet['Dietary_Citation_Count'], errors='coerce').fillna(0).astype(int)
 
          # Star ratings
          df_vet['Overall_Rating'] = pd.to_numeric(df_vet.get('Overall Rating', pd.Series()), errors='coerce')
          df_vet['Health_Inspection_Rating'] = pd.to_numeric(df_vet.get('Health Inspection Rating', pd.Series()), errors='coerce')
 
          # HOT HOT flags
          df_vet['HOT_HOT_EVS'] = (
              (df_vet['EVS_Citation_Count'] >= 2) &
              (df_vet['Health_Inspection_Rating'] <= 2)
          ).map({True: 'Yes', False: 'No'})
 
          df_vet['HOT_HOT_Dietary'] = (
              (df_vet['Dietary_Citation_Count'] >= 2) &
              (df_vet['Health_Inspection_Rating'] <= 2)
          ).map({True: 'Yes', False: 'No'})
 
          # Priority sort
          def priority(row):
              if row['HOT_HOT_EVS'] == 'Yes' and row['HOT_HOT_Dietary'] == 'Yes':
                  return 1
              elif row['HOT_HOT_EVS'] == 'Yes' or row['HOT_HOT_Dietary'] == 'Yes':
                  return 2
              else:
                  return 3
          df_vet['Priority_Sort'] = df_vet.apply(priority, axis=1)
 
          # Region map
          region_map = {
              'ME':'Northeast','NH':'Northeast','VT':'Northeast','MA':'Northeast',
              'RI':'Northeast','CT':'Northeast','NY':'Northeast','NJ':'Northeast','PA':'Northeast',
              'DE':'Northeast','MD':'Northeast','DC':'Northeast',
              'VA':'Southeast','WV':'Southeast','NC':'Southeast','SC':'Southeast',
              'GA':'Southeast','FL':'Southeast','AL':'Southeast','MS':'Southeast',
              'TN':'Southeast','KY':'Southeast','AR':'Southeast','LA':'Southeast',
              'OH':'Midwest','IN':'Midwest','IL':'Midwest','MI':'Midwest','WI':'Midwest',
              'MN':'Midwest','IA':'Midwest','MO':'Midwest','ND':'Midwest','SD':'Midwest',
              'NE':'Midwest','KS':'Midwest',
              'TX':'South Central','OK':'South Central',
              'MT':'Mountain West','ID':'Mountain West','WY':'Mountain West','CO':'Mountain West',
              'NM':'Mountain West','AZ':'Mountain West','UT':'Mountain West','NV':'Mountain West',
              'WA':'Pacific','OR':'Pacific','CA':'Pacific','AK':'Pacific','HI':'Pacific',
              'PR':'Territories','VI':'Territories','GU':'Territories',
          }
          df_vet['Region'] = df_vet['Provider State'].map(region_map).fillna('Other')
 
          # Save
          df_vet.to_csv('Powerlink_PowerBI_Data.csv', index=False)
 
          # Changes report
          hot_evs = int((df_vet['HOT_HOT_EVS'] == 'Yes').sum())
          hot_diet = int((df_vet['HOT_HOT_Dietary'] == 'Yes').sum())
          both = int(((df_vet['HOT_HOT_EVS'] == 'Yes') & (df_vet['HOT_HOT_Dietary'] == 'Yes')).sum())
          report = {
              "total_facilities": len(df_vet),
              "hot_hot_evs": hot_evs,
              "hot_hot_dietary": hot_diet,
              "hot_hot_both": both
          }
          with open('changes_report.json', 'w') as f:
              json.dump(report, f)
 
          print(f"Done. HOT HOT EVS: {hot_evs}, HOT HOT Dietary: {hot_diet}, Both: {both}")
          PYEOF
 
      - name: Push HOT HOT leads to SharpSpring
        env:
          SHARPSPRING_ACCOUNT_ID: ${{ secrets.SHARPSPRING_ACCOUNT_ID }}
          SHARPSPRING_SECRET_KEY: ${{ secrets.SHARPSPRING_SECRET_KEY }}
        run: |
          python3 << 'PYEOF'
          import pandas as pd
          import requests
          import json
          import hashlib
          import time
          import os
          import uuid
 
          account_id = os.environ['SHARPSPRING_ACCOUNT_ID']
          secret_key = os.environ['SHARPSPRING_SECRET_KEY']
 
          def sharpspring_request(method, params):
              request_id = str(uuid.uuid4())
              session_id = hashlib.md5((account_id + secret_key).encode()).hexdigest()
              payload = {
                  "method": method,
                  "params": params,
                  "id": request_id
              }
              url = f"https://api.sharpspring.com/pubapi/v1/?accountID={account_id}&secretKey={secret_key}"
              resp = requests.post(url, json=payload, timeout=30)
              resp.raise_for_status()
              return resp.json()
 
          # Load the HOT HOT leads
          df = pd.read_csv('Powerlink_PowerBI_Data.csv', dtype=str)
          hot = df[(df['HOT_HOT_EVS'] == 'Yes') | (df['HOT_HOT_Dietary'] == 'Yes')].copy()
          print(f"Total HOT HOT leads to sync: {len(hot)}")
 
          # Build lead objects for SharpSpring
          leads = []
          for _, row in hot.iterrows():
              facility_name = str(row.get('Facility Name', '')).strip()
              state = str(row.get('Provider State', '')).strip()
              city = str(row.get('Provider City', '')).strip()
              address = str(row.get('Provider Address', '')).strip()
              phone = str(row.get('Provider Phone Number', '')).strip()
              beds = str(row.get('Number of Certified Beds', '')).strip()
              overall_rating = str(row.get('Overall_Rating', '')).strip()
              health_rating = str(row.get('Health_Inspection_Rating', '')).strip()
              evs_count = str(row.get('EVS_Citation_Count', '0')).strip()
              diet_count = str(row.get('Dietary_Citation_Count', '0')).strip()
              hot_evs = str(row.get('HOT_HOT_EVS', 'No')).strip()
              hot_diet = str(row.get('HOT_HOT_Dietary', 'No')).strip()
              priority = str(row.get('Priority_Sort', '3')).strip()
              federal_id = str(row.get('Federal Provider Number', '')).strip()
 
              # Determine tier label
              if hot_evs == 'Yes' and hot_diet == 'Yes':
                  tier = 'HOT HOT EVS + Dietary'
              elif hot_evs == 'Yes':
                  tier = 'HOT HOT EVS'
              else:
                  tier = 'HOT HOT Dietary'
 
              care_compare_url = f"https://www.medicare.gov/care-compare/details/nursing-home/{federal_id}" if federal_id else ""
 
              lead = {
                  "companyName": facility_name,
                  "city": city,
                  "state": state,
                  "street": address,
                  "phoneNumber": phone,
                  "description": (
                      f"Opportunity Tier: {tier} | "
                      f"Overall Rating: {overall_rating} stars | "
                      f"Health Inspection Rating: {health_rating} stars | "
                      f"EVS Citations: {evs_count} | "
                      f"Dietary Citations: {diet_count} | "
                      f"Certified Beds: {beds} | "
                      f"CMS ID: {federal_id} | "
                      f"Care Compare: {care_compare_url}"
                  ),
                  "leadStatus": "Open",
                  "firstName": "Director",
                  "lastName": facility_name,
                  "emailAddress": "",
              }
              leads.append(lead)
 
          # Push in batches of 20
          batch_size = 20
          total_pushed = 0
          errors = 0
          for i in range(0, len(leads), batch_size):
              batch = leads[i:i+batch_size]
              try:
                  result = sharpspring_request("createLeads", {"objects": batch})
                  if result.get('result') and result['result'].get('creates'):
                      pushed = len([r for r in result['result']['creates'] if r.get('success')])
                      total_pushed += pushed
                      print(f"Batch {i//batch_size + 1}: pushed {pushed}/{len(batch)}")
                  else:
                      print(f"Batch {i//batch_size + 1} response: {json.dumps(result)[:200]}")
                  time.sleep(0.5)  # rate limit courtesy
              except Exception as e:
                  print(f"Batch {i//batch_size + 1} error: {e}")
                  errors += 1
 
          print(f"\nSharpSpring sync complete. Pushed: {total_pushed}, Errors: {errors}")
          PYEOF
 
      - name: Send email alert
        env:
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python3 << 'PYEOF'
          import smtplib, json, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
 
          with open('changes_report.json') as f:
              report = json.load(f)
 
          FROM = os.environ['ALERT_EMAIL_FROM']
          TO = os.environ['ALERT_EMAIL_TO']
          PASSWORD = os.environ['ALERT_EMAIL_PASSWORD']
 
          msg = MIMEMultipart('alternative')
          msg['Subject'] = f"Powerlink HOT HOT Update — {report['hot_hot_evs']} EVS | {report['hot_hot_dietary']} Dietary leads pushed to SharpSpring"
          msg['From'] = FROM
          msg['To'] = TO
 
          html = f"""
          <html><body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;">
          <h2 style="color:#1a1a2e;">Powerlink Monthly Intelligence Refresh</h2>
          <table style="width:100%;border-collapse:collapse;">
            <tr style="background:#e8f4fd;"><td style="padding:12px;font-weight:bold;">Total Veteran Facilities</td><td style="padding:12px;">{report['total_facilities']}</td></tr>
            <tr><td style="padding:12px;font-weight:bold;">HOT HOT EVS Leads</td><td style="padding:12px;color:#c0392b;font-weight:bold;">{report['hot_hot_evs']}</td></tr>
            <tr style="background:#e8f4fd;"><td style="padding:12px;font-weight:bold;">HOT HOT Dietary Leads</td><td style="padding:12px;color:#c0392b;font-weight:bold;">{report['hot_hot_dietary']}</td></tr>
            <tr><td style="padding:12px;font-weight:bold;">Both EVS + Dietary</td><td style="padding:12px;color:#8e44ad;font-weight:bold;">{report['hot_hot_both']}</td></tr>
          </table>
          <p style="margin-top:20px;">All HOT HOT leads have been automatically pushed to SharpSpring CRM.</p>
          <a href="https://powerlink-sales-intel.streamlit.app" style="display:inline-block;background:#1a1a2e;color:white;padding:12px 24px;text-decoration:none;border-radius:6px;margin-top:10px;">View Live Dashboard</a>
          </body></html>
          """
 
          msg.attach(MIMEText(html, 'html'))
 
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(FROM, PASSWORD)
              server.sendmail(FROM, TO, msg.as_string())
 
          print("Email sent successfully")
          PYEOF
 
      - name: Commit updated data back to GitHub
        run: |
          git config user.name  "Powerlink Bot"
          git config user.email "bot@powerlink"
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git add Powerlink_PowerBI_Data.csv changes_report.json
          git diff --staged --quiet || git commit -m "Monthly CMS refresh — $(date +'%B %Y')"
          git push
 


