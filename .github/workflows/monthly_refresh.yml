name: Monthly CMS Data Refresh

on:
  schedule:
    - cron: '0 8 1 * *'  # Runs at 8:00 AM UTC on the 1st of every month
  workflow_dispatch:       # Also allows manual trigger anytime from GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests openpyxl

      - name: Download latest Care Compare data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          print("Fetching latest Care Compare download URL...")
          meta_url = "https://data.cms.gov/provider-data/api/1/metastore/schemas/dataset/items/4pq5-n9py"
          with urllib.request.urlopen(meta_url, timeout=30) as r:
              meta = json.load(r)

          dist = meta.get("distribution", [])
          csv_url = None
          for item in dist:
              url = item.get("downloadURL", "")
              if url.endswith(".csv"):
                  csv_url = url
                  break

          if not csv_url:
              raise Exception("Could not find Care Compare CSV URL")

          print(f"Downloading from: {csv_url}")
          urllib.request.urlretrieve(csv_url, "NH_ProviderInfo_latest.csv")
          size = os.path.getsize("NH_ProviderInfo_latest.csv")
          print(f"Downloaded {size:,} bytes")
          PYEOF

      - name: Download latest Health Citations data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          print("Fetching Health Citations URL...")
          meta_url = "https://data.cms.gov/provider-data/api/1/metastore/schemas/dataset/items/r5ix-sfxw"
          with urllib.request.urlopen(meta_url, timeout=30) as r:
              meta = json.load(r)

          dist = meta.get("distribution", [])
          csv_url = None
          for item in dist:
              url = item.get("downloadURL", "")
              if url.endswith(".csv"):
                  csv_url = url
                  break

          if not csv_url:
              raise Exception("Could not find Health Citations CSV URL")

          print(f"Downloading from: {csv_url}")
          urllib.request.urlretrieve(csv_url, "NH_HealthCitations_latest.csv")
          size = os.path.getsize("NH_HealthCitations_latest.csv")
          print(f"Downloaded {size:,} bytes")
          PYEOF

      - name: Rebuild Powerlink database
        run: |
          python3 << 'PYEOF'
          import pandas as pd
          import numpy as np
          import json

          print("Loading previous data for change detection...")
          try:
              old_df = pd.read_csv("Powerlink_PowerBI_Data.csv", dtype=str, low_memory=False)
              has_old = True
              print(f"  Previous data: {len(old_df):,} facilities")
          except:
              old_df = pd.DataFrame()
              has_old = False
              print("  No previous data found - first run")

          print("Loading new Care Compare data...")
          cc = pd.read_csv("NH_ProviderInfo_latest.csv", dtype=str, low_memory=False)
          cc["CCN"] = cc["CMS Certification Number (CCN)"].str.strip().str.zfill(6)
          print(f"  {len(cc):,} providers")

          print("Loading health citations...")
          def_df = pd.read_csv("NH_HealthCitations_latest.csv", dtype=str, low_memory=False)
          def_df["CCN"] = def_df["CMS Certification Number (CCN)"].str.strip().str.zfill(6)
          def_df["tag"] = def_df["Deficiency Tag Number"].str.strip().str.zfill(4)

          evs_tags  = ["0880","0441","0584","0610","0689"]
          diet_tags = ["0800","0801","0802","0803","0804","0805","0806",
                       "0807","0808","0809","0810","0811","0812",
                       "0692","0693","0694","0695"]

          evs_c  = def_df[def_df["tag"].isin(evs_tags)].groupby("CCN").size().reset_index(name="EVS_Citations_3yr")
          diet_c = def_df[def_df["tag"].isin(diet_tags)].groupby("CCN").size().reset_index(name="Dietary_Citations_3yr")
          f880_c = def_df[def_df["tag"]=="0880"].groupby("CCN").size().reset_index(name="F880_Infection_Citations")

          print("Building master database...")
          cols = [
              "CCN","Provider Name","Provider Address","City/Town","State",
              "ZIP Code","Telephone Number","Ownership Type",
              "Number of Certified Beds","Average Number of Residents per Day",
              "Overall Rating","Health Inspection Rating","QM Rating",
              "Staffing Rating","Number of Fines",
              "Total Amount of Fines in Dollars","Total Number of Penalties",
              "Number of Citations from Infection Control Inspections",
              "Special Focus Status","Chain Name"
          ]
          cols = [c for c in cols if c in cc.columns]
          df = cc[cols].copy()
          df = df.merge(evs_c, on="CCN", how="left")
          df = df.merge(diet_c, on="CCN", how="left")
          df = df.merge(f880_c, on="CCN", how="left")

          df.rename(columns={
              "Provider Name":"Facility_Name","Provider Address":"Address",
              "City/Town":"City","ZIP Code":"ZIP",
              "Telephone Number":"Phone","Ownership Type":"Ownership_Type",
              "Number of Certified Beds":"Certified_Beds",
              "Average Number of Residents per Day":"Avg_Daily_Residents",
              "Overall Rating":"Overall_Stars",
              "Health Inspection Rating":"Health_Inspection_Stars",
              "QM Rating":"QM_Stars","Staffing Rating":"Staffing_Stars",
              "Number of Fines":"Num_Fines",
              "Total Amount of Fines in Dollars":"Fine_Amount_USD",
              "Total Number of Penalties":"Num_Penalties",
              "Number of Citations from Infection Control Inspections":"Infection_Control_Citations",
              "Special Focus Status":"Special_Focus_Status",
              "Chain Name":"Chain_Name"
          }, inplace=True)

          for c in ["Certified_Beds","Overall_Stars","Health_Inspection_Stars",
                    "QM_Stars","Staffing_Stars","Num_Fines","Fine_Amount_USD",
                    "EVS_Citations_3yr","Dietary_Citations_3yr","F880_Infection_Citations"]:
              if c in df.columns:
                  df[c] = pd.to_numeric(df[c], errors="coerce")

          df[["EVS_Citations_3yr","Dietary_Citations_3yr","F880_Infection_Citations"]] = \
              df[["EVS_Citations_3yr","Dietary_Citations_3yr","F880_Infection_Citations"]].fillna(0)

          # NOTE: HCRIS cost report data is annual - carry forward from existing file
          # when doing monthly Care Compare refresh
          if has_old and "HK_Contract_Labor_USD" in old_df.columns:
              print("  Carrying forward HCRIS cost report data from previous build...")
              hcris_cols = ["CCN","HK_Direct_Labor_USD","HK_Contract_Labor_USD",
                            "Diet_Direct_Labor_USD","Diet_Contract_Labor_USD"]
              hcris_carry = old_df[[c for c in hcris_cols if c in old_df.columns]].copy()
              df = df.merge(hcris_carry, on="CCN", how="left")
          else:
              for c in ["HK_Direct_Labor_USD","HK_Contract_Labor_USD",
                        "Diet_Direct_Labor_USD","Diet_Contract_Labor_USD"]:
                  df[c] = np.nan

          for c in ["HK_Direct_Labor_USD","HK_Contract_Labor_USD",
                    "Diet_Direct_Labor_USD","Diet_Contract_Labor_USD"]:
              df[c] = pd.to_numeric(df[c], errors="coerce").fillna(0)

          # Flags
          df["EVS_Currently_Contracted"] = (df["HK_Contract_Labor_USD"] > 0).map({True:"Yes",False:"No"})
          df["Dietary_Currently_Contracted"] = (df["Diet_Contract_Labor_USD"] > 0).map({True:"Yes",False:"No"})
          df["EVS_Self_Performing"] = ((df["HK_Direct_Labor_USD"] > 0) & (df["HK_Contract_Labor_USD"] == 0)).map({True:"Yes",False:"No"})
          df["Dietary_Self_Performing"] = ((df["Diet_Direct_Labor_USD"] > 0) & (df["Diet_Contract_Labor_USD"] == 0)).map({True:"Yes",False:"No"})
          df["HOT_HOT_EVS"] = ((df["EVS_Self_Performing"]=="Yes") & (df["EVS_Citations_3yr"] > 0)).map({True:"Yes",False:"No"})
          df["HOT_HOT_Dietary"] = ((df["Dietary_Self_Performing"]=="Yes") & (df["Dietary_Citations_3yr"] > 0)).map({True:"Yes",False:"No"})

          # Tiers
          def evs_tier(r):
              if r["HK_Contract_Labor_USD"] > 0: return "Already contracted"
              hi = r.get("Health_Inspection_Stars",5) or 5
              cit = r.get("EVS_Citations_3yr",0) or 0
              if hi <= 2 and cit >= 2: return "Hot - low rating + EVS citations"
              if hi <= 2: return "Warm - low health inspection"
              if cit >= 3: return "Warm - repeat EVS citations"
              if r["HK_Direct_Labor_USD"] > 0: return "Self-performing - monitor"
              return "Insufficient data"

          def diet_tier(r):
              if r["Diet_Contract_Labor_USD"] > 0: return "Already contracted"
              qm = r.get("QM_Stars",5) or 5
              cit = r.get("Dietary_Citations_3yr",0) or 0
              if qm <= 2 and cit >= 2: return "Hot - low QM + dietary citations"
              if qm <= 2: return "Warm - low QM rating"
              if cit >= 3: return "Warm - repeat dietary citations"
              if r["Diet_Direct_Labor_USD"] > 0: return "Self-performing - monitor"
              return "Insufficient data"

          df["EVS_Opportunity_Clean"] = df.apply(evs_tier, axis=1)
          df["Dietary_Opportunity_Clean"] = df.apply(diet_tier, axis=1)

          priority_map = {True: 1}
          def priority(r):
              e, d = r["EVS_Opportunity_Clean"], r["Dietary_Opportunity_Clean"]
              if "Hot" in e or "Hot" in d: return "1 — Hot lead"
              if "contracted" in e or "contracted" in d: return "2 — Incumbent displacement"
              if "Warm" in e or "Warm" in d: return "3 — Warm lead"
              if "monitor" in e or "monitor" in d: return "4 — Monitor"
              return "5 — Insufficient data"

          df["Overall_Priority"] = df.apply(priority, axis=1)
          psort = {"1 — Hot lead":1,"2 — Incumbent displacement":2,
                   "3 — Warm lead":3,"4 — Monitor":4,"5 — Insufficient data":5}
          df["Priority_Sort"] = df["Overall_Priority"].map(psort).fillna(9).astype(int)

          region_map = {
              "ME":"Northeast","NH":"Northeast","VT":"Northeast","MA":"Northeast",
              "RI":"Northeast","CT":"Northeast","NY":"Northeast","NJ":"Northeast",
              "PA":"Northeast","DE":"Northeast","MD":"Northeast","DC":"Northeast",
              "WV":"Southeast","VA":"Southeast","NC":"Southeast","SC":"Southeast",
              "GA":"Southeast","FL":"Southeast","AL":"Southeast","MS":"Southeast",
              "TN":"Southeast","KY":"Southeast","AR":"Southeast","LA":"Southeast",
              "OH":"Midwest","IN":"Midwest","IL":"Midwest","MI":"Midwest",
              "WI":"Midwest","MN":"Midwest","IA":"Midwest","MO":"Midwest",
              "ND":"Midwest","SD":"Midwest","NE":"Midwest","KS":"Midwest",
              "TX":"South Central","OK":"South Central",
              "MT":"Mountain West","ID":"Mountain West","WY":"Mountain West",
              "CO":"Mountain West","NM":"Mountain West","AZ":"Mountain West",
              "UT":"Mountain West","NV":"Mountain West",
              "WA":"Pacific","OR":"Pacific","CA":"Pacific","AK":"Pacific","HI":"Pacific"
          }
          df["Region"] = df["State"].map(region_map).fillna("Other")

          def star_label(v):
              try: return f"{int(float(v))} Star"
              except: return "Not Rated"

          df["Overall_Stars_Label"] = df["Overall_Stars"].apply(star_label)
          df["Health_Inspection_Stars_Label"] = df["Health_Inspection_Stars"].apply(star_label)
          df["QM_Stars_Label"] = df["QM_Stars"].apply(star_label)

          # ── Change detection ──
          changes = {
              "new_facilities": [],
              "dropped_to_1star": [],
              "new_hot_hot_evs": [],
              "new_hot_hot_dietary": [],
              "total_facilities": len(df),
              "hot_hot_evs_count": int((df["HOT_HOT_EVS"]=="Yes").sum()),
              "hot_hot_dietary_count": int((df["HOT_HOT_Dietary"]=="Yes").sum()),
              "hot_leads_count": int((df["Priority_Sort"]==1).sum()),
          }

          if has_old and "CCN" in old_df.columns:
              old_ccns = set(old_df["CCN"].astype(str).str.zfill(6))
              new_ccns = set(df["CCN"].astype(str).str.zfill(6))
              new_fac = df[df["CCN"].isin(new_ccns - old_ccns)][["Facility_Name","City","State"]].head(20)
              changes["new_facilities"] = new_fac.to_dict("records")

              if "Health_Inspection_Stars" in old_df.columns:
                  old_stars = old_df[["CCN","Health_Inspection_Stars"]].copy()
                  old_stars.columns = ["CCN","old_stars"]
                  old_stars["CCN"] = old_stars["CCN"].astype(str).str.zfill(6)
                  merged = df[["CCN","Facility_Name","City","State","Health_Inspection_Stars"]].merge(old_stars, on="CCN", how="inner")
                  merged["Health_Inspection_Stars"] = pd.to_numeric(merged["Health_Inspection_Stars"], errors="coerce")
                  merged["old_stars"] = pd.to_numeric(merged["old_stars"], errors="coerce")
                  dropped = merged[(merged["Health_Inspection_Stars"]==1) & (merged["old_stars"]>1)]
                  changes["dropped_to_1star"] = dropped[["Facility_Name","City","State"]].head(20).to_dict("records")

              if "HOT_HOT_EVS" in old_df.columns:
                  old_hot = set(old_df[old_df["HOT_HOT_EVS"]=="Yes"]["CCN"].astype(str).str.zfill(6))
                  new_hot = set(df[df["HOT_HOT_EVS"]=="Yes"]["CCN"].astype(str).str.zfill(6))
                  newly_hot = df[df["CCN"].isin(new_hot - old_hot)][["Facility_Name","City","State"]].head(20)
                  changes["new_hot_hot_evs"] = newly_hot.to_dict("records")

              if "HOT_HOT_Dietary" in old_df.columns:
                  old_hotd = set(old_df[old_df["HOT_HOT_Dietary"]=="Yes"]["CCN"].astype(str).str.zfill(6))
                  new_hotd = set(df[df["HOT_HOT_Dietary"]=="Yes"]["CCN"].astype(str).str.zfill(6))
                  newly_hotd = df[df["CCN"].isin(new_hotd - old_hotd)][["Facility_Name","City","State"]].head(20)
                  changes["new_hot_hot_dietary"] = newly_hotd.to_dict("records")

          with open("changes_report.json", "w") as f:
              json.dump(changes, f, indent=2)

          df.to_csv("Powerlink_PowerBI_Data.csv", index=False)
          print(f"Saved {len(df):,} facilities to Powerlink_PowerBI_Data.csv")
          print(f"Changes report saved to changes_report.json")
          PYEOF

      - name: Send email alert
        env:
          EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          EMAIL_TO:   ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python3 << 'PYEOF'
          import smtplib, json, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime

          with open("changes_report.json") as f:
              ch = json.load(f)

          date_str = datetime.now().strftime("%B %Y")

          def rows(items, label):
              if not items:
                  return f"<p style='color:#666'>No {label} this month.</p>"
              html = "<ul style='margin:4px 0;padding-left:20px'>"
              for r in items:
                  html += f"<li><b>{r.get('Facility_Name','')}</b> — {r.get('City','')}, {r.get('State','')}</li>"
              html += "</ul>"
              return html

          body = f"""
          <html><body style='font-family:Arial,sans-serif;color:#222;max-width:680px;margin:auto'>
            <div style='background:#1B2A4A;padding:20px 28px;border-radius:8px 8px 0 0'>
              <span style='color:white;font-size:1.4rem;font-weight:700'>POWERLINK</span>
              <span style='color:#AAC4DE;font-size:1rem;margin-left:10px'>Monthly Dashboard Update — {date_str}</span>
            </div>
            <div style='background:#F8F9FA;padding:20px 28px;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px'>

              <h3 style='color:#1B2A4A;border-bottom:2px solid #1B2A4A;padding-bottom:6px'>📊 Current Totals</h3>
              <table style='width:100%;border-collapse:collapse'>
                <tr>
                  <td style='padding:8px;background:#FEF2F2;border-radius:6px;text-align:center;width:25%'>
                    <div style='font-size:1.8rem;font-weight:700;color:#991B1B'>{ch['hot_hot_evs_count']}</div>
                    <div style='font-size:.75rem;color:#666;text-transform:uppercase'>HOT HOT EVS</div>
                  </td>
                  <td style='width:2%'></td>
                  <td style='padding:8px;background:#FEF2F2;border-radius:6px;text-align:center;width:25%'>
                    <div style='font-size:1.8rem;font-weight:700;color:#991B1B'>{ch['hot_hot_dietary_count']}</div>
                    <div style='font-size:.75rem;color:#666;text-transform:uppercase'>HOT HOT Dietary</div>
                  </td>
                  <td style='width:2%'></td>
                  <td style='padding:8px;background:#FFFBEB;border-radius:6px;text-align:center;width:25%'>
                    <div style='font-size:1.8rem;font-weight:700;color:#854D0E'>{ch['hot_leads_count']}</div>
                    <div style='font-size:.75rem;color:#666;text-transform:uppercase'>Hot Leads</div>
                  </td>
                  <td style='width:2%'></td>
                  <td style='padding:8px;background:#F0FFF4;border-radius:6px;text-align:center;width:19%'>
                    <div style='font-size:1.8rem;font-weight:700;color:#166534'>{ch['total_facilities']:,}</div>
                    <div style='font-size:.75rem;color:#666;text-transform:uppercase'>Total SNFs</div>
                  </td>
                </tr>
              </table>

              <h3 style='color:#991B1B;margin-top:20px'>🔥🔥 New HOT HOT EVS Targets This Month</h3>
              {rows(ch.get('new_hot_hot_evs',[]), 'new HOT HOT EVS facilities')}

              <h3 style='color:#78350F;margin-top:16px'>🔥🔥 New HOT HOT Dietary Targets This Month</h3>
              {rows(ch.get('new_hot_hot_dietary',[]), 'new HOT HOT Dietary facilities')}

              <h3 style='color:#991B1B;margin-top:16px'>⭐ Facilities That Dropped to 1-Star Health Inspection</h3>
              {rows(ch.get('dropped_to_1star',[]), 'facilities that dropped to 1-star')}

              <h3 style='color:#1B2A4A;margin-top:16px'>🆕 Newly Added Facilities</h3>
              {rows(ch.get('new_facilities',[]), 'new facilities')}

              <div style='margin-top:24px;padding:14px;background:#E6F1FB;border-radius:6px;text-align:center'>
                <a href='https://powerlink-sales-intel.streamlit.app'
                   style='background:#1B2A4A;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;font-weight:600'>
                  Open Live Dashboard →
                </a>
              </div>

              <p style='font-size:.75rem;color:#999;margin-top:20px;text-align:center'>
                Data: CMS Care Compare {date_str} | Powerlink Sales Intelligence | Auto-generated monthly alert
              </p>
            </div>
          </body></html>
          """

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"Powerlink Dashboard Update — {date_str} | {ch['hot_hot_evs_count']} HOT HOT EVS | {ch['hot_hot_dietary_count']} HOT HOT Dietary"
          msg["From"]    = os.environ["EMAIL_FROM"]
          msg["To"]      = os.environ["EMAIL_TO"]
          msg.attach(MIMEText(body, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(os.environ["EMAIL_FROM"], os.environ["EMAIL_PASS"])
              server.send_message(msg)

          print(f"Alert email sent to {os.environ['EMAIL_TO']}")
          PYEOF

      - name: Commit updated data back to GitHub
        run: |
          git config user.name  "Powerlink Bot"
          git config user.email "bot@powerlink"
          git add Powerlink_PowerBI_Data.csv changes_report.json
          git diff --staged --quiet || git commit -m "Monthly CMS refresh — $(date +'%B %Y')"
          git push
